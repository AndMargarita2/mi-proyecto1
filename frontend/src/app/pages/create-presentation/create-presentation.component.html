<main class="editor">
  <app-header 
    type="editor"
    logoText="D"
    [title]="presentationTitle"
    homeLink="/"
  ></app-header>

  <section class="workspace">
    <aside class="left-panel">
      <app-button variant="ghost" [fullWidth]="true">Diseno</app-button>
      <app-button variant="ghost" [fullWidth]="true">Elementos</app-button>
      <app-button variant="ghost" [fullWidth]="true">Texto</app-button>
      <app-button variant="ghost" [fullWidth]="true">Herramientas</app-button>
      <app-button variant="ghost" [fullWidth]="true">Media</app-button>
    </aside>

    <section class="canvas-area">
      <div class="main-canvas" aria-label="Lienzo de diapositiva"></div>
      <div class="controls">
        <app-button 
          variant="secondary" 
          size="sm"
          ariaLabel="Diapositiva anterior"
        >
          &#8249;
        </app-button>
        <app-button 
          variant="secondary" 
          size="sm"
          ariaLabel="Diapositiva siguiente"
        >
          &#8250;
        </app-button>
      </div>
    </section>

    <aside class="thumbs">
      @for (slide of slides; track slide) {
        <button class="thumb" [attr.aria-label]="'Miniatura de diapositiva ' + slide"></button>
      }
    </aside>
  </section>
</main>
