<main class="catalog-page">
  <app-header 
    type="catalog"
    logoText="D"
    title="Catalogo"
    searchPlaceholder="Busca entre los proyectos..."
  ></app-header>

  <section class="toolbar">
    <div class="filters">
      <app-select 
        [options]="categoryOptions"
        [selectedValue]="selectedCategory"
        placeholder="Filtro de categoria"
        (valueChange)="onCategoryChange($event)"
      ></app-select>
      <app-select 
        [options]="sortOptions"
        [selectedValue]="selectedSort"
        placeholder="Ordenar por"
        (valueChange)="onSortChange($event)"
      ></app-select>
    </div>

    <div class="actions">
      <app-button variant="primary" size="sm" routerLink="/crear-presentacion">
        Abrir editor
      </app-button>
      <app-button variant="secondary" size="sm">Ver</app-button>
      <app-button variant="secondary" size="sm">Editar</app-button>
      <app-button variant="danger" size="sm">Borrar</app-button>
    </div>
  </section>

  <section class="grid">
    @if (filteredItems.length === 0) {
      <p class="catalog-empty">No hay presentaciones que coincidan con la búsqueda.</p>
    } @else {
      @for (item of filteredItems; track item.title) {
        <app-card variant="elevated" [clickable]="true">
          <div class="preview"></div>
          <div class="meta">
            <p>Autor: {{ item.author }}</p>
            <p>Titulo: {{ item.title }}</p>
          </div>
        </app-card>
      }
    }
  </section>
</main>
