<main class="home">
  <header class="topbar">
    <button class="menu-btn" aria-label="Abrir menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="logo" aria-label="Logo">D</div>
    <input
      class="search"
      type="text"
      placeholder="Busca entre los proyectos..."
      aria-label="Buscar proyecto"
    />
    <button class="login-btn">Iniciar sesion</button>
  </header>

  <section class="hero">
    <div class="hero-content">
      <p class="tagline">Tus ideas, proyectadas</p>
      <h1>Crea presentaciones claras y atractivas en minutos</h1>
      <button class="primary-btn" routerLink="/crear-presentacion">Crea una nueva presentacion</button>
    </div>
    <div class="hero-art" aria-hidden="true"></div>
  </section>

  <section class="catalog">
    <button class="catalog-btn" routerLink="/catalogo">Catalogo</button>
    <div class="slider-track">
      @for (card of presentationCards; track card.title) {
        <article class="slide-card">
          <div class="slide-image"></div>
          <h3>{{ card.title }}</h3>
        </article>
      }
    </div>
  </section>

  <section class="highlights">
    @for (item of highlights; track item.title) {
      <article class="feature-card">
        <div class="feature-icon" aria-hidden="true"></div>
        <h2>{{ item.title }}</h2>
      </article>
    }
  </section>
</main>
