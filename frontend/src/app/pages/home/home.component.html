<main class="home">
  <app-header 
    type="main"
    logoText="D"
    searchPlaceholder="Busca entre los proyectos..."
  ></app-header>

  <section class="hero">
    <div class="hero-content">
      <p class="tagline">Tus ideas, proyectadas</p>
      <h1>Crea presentaciones claras y atractivas en minutos</h1>
      <app-button 
        variant="primary" 
        size="lg"
        routerLink="/crear-presentacion"
      >
        Crea una nueva presentacion
      </app-button>
    </div>
    <div class="hero-art" aria-hidden="true"></div>
  </section>

  <section class="catalog">
    <app-button 
      variant="secondary"
      routerLink="/catalogo"
    >
      Catalogo
    </app-button>
    <div class="slider-track">
      @for (card of presentationCards; track card.title) {
        <app-card variant="elevated" [clickable]="true">
          <div class="slide-image"></div>
          <h3>{{ card.title }}</h3>
        </app-card>
      }
    </div>
  </section>

  <section class="highlights">
    @for (item of highlights; track item.title) {
      <app-card variant="default" [clickable]="true">
        <div class="feature-icon" aria-hidden="true"></div>
        <h2>{{ item.title }}</h2>
      </app-card>
    }
  </section>
</main>
